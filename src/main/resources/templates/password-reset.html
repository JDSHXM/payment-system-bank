<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Сброс пароля</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f6f9fc; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 30px auto; background: #ffffff;
                     border-radius: 8px; padding: 25px;
                     box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        h2 { color: #c62828; }
        p { color: #333; }
        a.button {
            display: inline-block; margin-top: 20px; padding: 12px 20px;
            background: #1565c0; color: #fff; text-decoration: none;
            border-radius: 6px; font-weight: bold;
        }
        .footer { margin-top: 30px; font-size: 13px; color: #555; }
    </style>
</head>
<body>
<div class="container">
    <h2>Запрос на сброс пароля</h2>
    <p>Здравствуйте <span th:text="${name}">Пользователь</span>,</p>
    <p>Мы получили запрос на сброс вашего пароля. Пожалуйста, нажмите кнопку ниже, чтобы сбросить его:</p>
    <a th:href="${resetLink}" class="button">Сбросить пароль</a>
    <p>Если вы не запрашивали это, пожалуйста, проигнорируйте это письмо.</p>
    <div class="footer">
        © 2026 Payment Systeam
    </div>
</div>
</body>
</html>
