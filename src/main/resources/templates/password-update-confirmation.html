<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Пароль обновлён</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f6f9fc; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 30px auto; background: #ffffff;
                     border-radius: 8px; padding: 25px;
                     box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        h2 { color: #2e7d32; }
        p { color: #333; }
        .footer { margin-top: 30px; font-size: 13px; color: #555; }
    </style>
</head>
<body>
<div class="container">
    <h2> Пароль успешно обновлён ✅</h2>
    <p>Здравствуйте, <span th:text="${name}">Пользователь</span>,</p>
    <p>Ваш пароль был успешно обновлён. Если это сделали не вы, пожалуйста, немедленно сбросьте пароль.</p>
    <div class="footer">© 2026 Payment Systeam</div>
</div>
</body>
</html>
