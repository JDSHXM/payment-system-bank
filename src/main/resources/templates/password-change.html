<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Смена Пароля</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f6f9fc; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 30px auto; background: #ffffff;
                     border-radius: 8px; padding: 25px;
                     box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        h2 { color: #1565c0; }
        p { color: #333; }
        .footer { margin-top: 30px; font-size: 13px; color: #555; }
    </style>
</head>
<body>
<div class="container">
    <h2>Смена Пароля</h2>
    <p>Здравствуйте <span th:text="${name}">Пользователь</span>,</p>
    <p>Ваш пароль был успешно изменен.</p>
    <p>Если вы не совершали это действие, пожалуйста <b>сбросьте ваш пароль немедленно</b> и свяжитесь с нашей службой поддержки.
    </p>
    <div class="footer">
        © 2026 Payment Systeam
    </div>
</div>
</body>
</html>
