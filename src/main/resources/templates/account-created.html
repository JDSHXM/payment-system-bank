<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ваш новый номер банковского счёта ✅</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7fb; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 30px auto; background: #ffffff; border-radius: 8px;
                     padding: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #2e7d32; text-align: center; }
        p { color: #333; line-height: 1.6; }
        ul { list-style: none; padding: 0; }
        li { background: #f1f1f1; margin: 5px 0; padding: 10px; border-radius: 5px; }
        .footer { margin-top: 30px; font-size: 13px; color: #777; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h2>Здравствуйте, <span th:text="${name}"></span> 👋</h2>
    <p>Ваш(а) <b><span th:text="${accountType}"></span></b> Счёт успешно создан 🎉</p>

    <p><b>Данные счёта:</b></p>
    <ul>
        <li>Номер счёта: <b th:text="${accountNumber}"></b></li>
        <li>Тип счёта: <b th:text="${accountType}"></b></li>
        <li>Валюта: <b th:text="${currency}"></b></li>
    </ul>

    <p>Теперь вы можете войти в систему и сразу начать пользоваться своим аккаунтом.</p>

    <div class="footer">
        © 2026 Payment Systeam
    </div>
</div>
</body>
</html>
